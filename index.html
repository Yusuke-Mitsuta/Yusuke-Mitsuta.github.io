<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Call Example</title>
</head>
<body>

    <h1>API Call on Button Click</h1>

    <!-- API呼び出しボタン -->
    <button id="apiButton">APIを呼び出す</button>

    <p id="apiResponse">APIのレスポンスがここに表示されます</p>

    <script>
        // APIボタンがクリックされたときの動作
        document.getElementById('apiButton').addEventListener('click', function() {
            // API呼び出し (GETリクエスト)
            fetch('https://jsonplaceholder.typicode.com/posts/1')  // ダミーのAPIエンドポイント
                .then(response => response.json())  // レスポンスをJSON形式に変換
                .then(data => {
                    // APIのレスポンスデータをページに表示
                    document.getElementById('apiResponse').innerText = 
                        "タイトル: " + data.title + "\n本文: " + data.body;
                })
                .catch(error => {
                    // エラーハンドリング
                    console.error('API呼び出し中にエラーが発生しました:', error);
                    document.getElementById('apiResponse').innerText = 'API呼び出し中にエラーが発生しました';
                });
        });
    </script>

</body>
</html>
